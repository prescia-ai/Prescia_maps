version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aurik_db
    environment:
      POSTGRES_DB: aurik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aurik"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aurik_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/aurik
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
